name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for IPA filename (e.g. 1.0.0-beta.18)'
        required: false
        type: string
        default: '1.0.0-beta.18'
  push:
    branches:
      - main
    paths:
      - ios/**
      - .github/workflows/build-ios-ipa.yml

permissions:
  contents: read
  actions: read

jobs:
  build-ipa:
    name: Build unsigned iOS IPA
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '26.3'

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace ../VibeTunnel.xcworkspace \
            -scheme VibeTunnel-iOS

      - name: Build unsigned device app
        working-directory: ios
        env:
          ACTOOL_IGNORE_VERSION_CHECK: "1"
          IBTOOL_IGNORE_VERSION_CHECK: "1"
        run: |
          xcodebuild build \
            -workspace ../VibeTunnel.xcworkspace \
            -scheme VibeTunnel-iOS \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ACTOOL_IGNORE_VERSION_CHECK=1 \
            IBTOOL_IGNORE_VERSION_CHECK=1

      - name: Package IPA
        working-directory: ios
        run: |
          set -euo pipefail
          PRODUCTS_DIR="build/DerivedData/Build/Products/Release-iphoneos"
          APP_PATH="$(find "$PRODUCTS_DIR" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in $PRODUCTS_DIR" >&2
            exit 1
          fi
          rm -rf package
          mkdir -p package/Payload
          cp -R "$APP_PATH" package/Payload/
          VERSION="${{ inputs.version || '1.0.0-beta.18' }}"
          IPA_NAME="VibeTunnel-${VERSION}.ipa"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent package/Payload "$IPA_NAME"
          /usr/bin/zipinfo -1 "$IPA_NAME" | sort
          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VibeTunnel-iOS-IPA
          path: ios/VibeTunnel-*.ipa
          if-no-files-found: error
          retention-days: 7
