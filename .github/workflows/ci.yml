name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Check which parts of the codebase have changed
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mac: ${{ steps.filter.outputs.mac }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
    - name: Test CI helper scripts
      run: >-
        node --test
        .github/actions/lint-reporter/comment-body.test.cjs
        .github/actions/ci-status-comment/report.test.cjs
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
      id: filter
      with:
        filters: |
          web:
            - 'web/**'
            - '.github/actions/lint-reporter/**'
            - '.github/actions/ci-status-comment/**'
            - '.github/workflows/node.yml'
            - '.github/workflows/web-ci.yml'
            - '.github/workflows/monitor-ci.yml'
            - 'package.json'
            - 'pnpm-workspace.yaml'
          mac:
            - 'mac/**'
            - '.github/workflows/mac.yml'
            - 'VibeTunnel.xcworkspace/**'
            - 'Package.swift'
            - 'Package.resolved'
          ios:
            - 'ios/**'
            - '.github/workflows/ios.yml'
            - 'VibeTunnel.xcworkspace/**'

  node:
    name: Node.js CI
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.mac == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/node.yml

  mac:
    name: Mac CI
    needs: [changes]
    if: |
      always() && 
      !contains(needs.*.result, 'failure') && 
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.mac == 'true' || needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/mac.yml
    
  ios:
    name: iOS CI
    needs: [changes]
    if: |
      always() && 
      !contains(needs.*.result, 'failure') && 
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.ios == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/ios.yml
