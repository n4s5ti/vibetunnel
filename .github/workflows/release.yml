name: Release Build Verification

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-mac:
    name: Build macOS App
    # Standard macos-15 is Apple Silicon; Intel uses macos-15-intel.
    runs-on: macos-15
    timeout-minutes: 60
    env:
      GITHUB_REPO_NAME: ${{ github.repository }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Verify Apple Silicon runner
      run: test "$(uname -m)" = arm64
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
      with:
        xcode-version: '26.3'
    
    - name: Setup Node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      with:
        node-version: '24'
    
    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        version: 10.15.0
        run_install: false

    - name: Install Zig 0.16.0
      shell: bash
      run: |
        arch="$(uname -m)"
        case "$arch" in
          arm64)
            zig_arch="aarch64"
            zig_sha256="b23d70deaa879b5c2d486ed3316f7eaa53e84acf6fc9cc747de152450d401489"
            ;;
          x86_64)
            zig_arch="x86_64"
            zig_sha256="0387557ed1877bc6a2e1802c8391953baddba76081876301c522f52977b52ba7"
            ;;
          *)
            echo "Unsupported runner architecture: $arch" >&2
            exit 1
            ;;
        esac
        archive="zig-${zig_arch}-macos-0.16.0.tar.xz"
        curl -fsSLO "https://ziglang.org/download/0.16.0/${archive}"
        echo "${zig_sha256}  ${archive}" | shasum -a 256 -c -
        tar -xJf "$archive"
        echo "$PWD/zig-${zig_arch}-macos-0.16.0" >> "$GITHUB_PATH"
    
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
    
    - name: Setup pnpm cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      continue-on-error: true
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: 1.3.14
    
    - name: Install web dependencies
      working-directory: web
      run: pnpm install --frozen-lockfile
    
    - name: Resolve Dependencies
      working-directory: mac
      run: |
        xcodebuild -resolvePackageDependencies \
          -project VibeTunnel.xcodeproj \
          -scheme VibeTunnel
    
    - name: Build Release
      working-directory: mac
      run: |
        ./scripts/build.sh --configuration Release --arch arm64

    - name: Create DMGs and ZIPs
      timeout-minutes: 15
      working-directory: mac
      run: |
        ./scripts/create-dmg.sh "build/Build/Products/Release/VibeTunnel.app"
        ./scripts/create-zip.sh "build/Build/Products/Release/VibeTunnel.app"
        
        # List created files
        echo "Created files:"
        ls -la build/*.dmg build/*.zip
    
    - name: Upload Release Artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: mac-release
        path: |
          mac/build/*.dmg
          mac/build/*.zip
        retention-days: 7
    
  build-ios:
    name: Build iOS App
    runs-on: macos-15
    env:
      GITHUB_REPO_NAME: ${{ github.repository }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
      with:
        xcode-version: '26.3'
    
    - name: Resolve Dependencies
      working-directory: ios
      run: |
        xcodebuild -resolvePackageDependencies \
          -workspace ../VibeTunnel.xcworkspace \
          -scheme VibeTunnel-iOS
    
    - name: Build iOS Release
      working-directory: ios
      run: |
        xcodebuild build \
          -workspace ../VibeTunnel.xcworkspace \
          -scheme VibeTunnel-iOS \
          -destination "generic/platform=iOS" \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=NO \
          -derivedDataPath build/DerivedData
    
    - name: Upload iOS Artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: ios-release
        path: ios/build/DerivedData/Build/Products/Release-iphoneos/
        retention-days: 7
